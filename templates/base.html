<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}中国入境海关指南{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <nav>
            <div class="nav-brand">
                <a href="{{ url_for('index') }}">China Customs Guide</a>
            </div>
            <ul class="nav-menu">
                <li><a href="{{ url_for('index') }}">首页</a></li>
                <li><a href="{{ url_for('categories') }}">物品分类</a></li>
                <li><a href="{{ url_for('about') }}">关于我们</a></li>
            </ul>
            <div class="nav-search">
                <form action="{{ url_for('search') }}" method="get">
                    <input type="text" name="q" placeholder="搜索物品...">
                    <button type="submit">搜索</button>
                </form>
            </div>
            <div class="language-switcher">
                <a href="#" class="active">中文</a> | <a href="#">English</a>
            </div>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; 2025 中国入境海关指南. 所有权利保留.</p>
            <p class="disclaimer">
                免责声明: 本网站提供的信息仅供参考，不构成法律建议。海关规定可能随时变更，
                建议出行前通过<a href="http://www.customs.gov.cn/" target="_blank">中国海关总署官方网站</a>再次确认。
            </p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
