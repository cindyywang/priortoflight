{% extends "base.html" %}
{% block title %}All Categories{% endblock %}

{% block content %}
<div class="container">
    <h1 class="mt-4">All Categories</h1>
    <ul class="list-group">
        {% for category in categories %}
            <li class="list-group-item">
                <a href="{{ url_for('category_page', category_id=category.id, lang=lang) }}">
                    {{ category.name if lang=='zh' else category.name_en }}
                </a>
            </li>
        {% endfor %}
    </ul>
</div>
{% endblock %}
