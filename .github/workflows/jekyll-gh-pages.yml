name: Deploy Jekyll to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up system Python (avoids missing /myenv/bin/python)
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # 3. Set up GitHub Pages environment
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 4. Install Bundler and Jekyll dependencies
      - name: Install Ruby dependencies
        run: |
          gem install bundler
          bundle install

      # 5. Build Jekyll site
      - name: Build Jekyll site
        run: |
          bundle exec jekyll build --source ./ --destination ./_site

      # 6. Upload the built site as artifact for deployment
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
